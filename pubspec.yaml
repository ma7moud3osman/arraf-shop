name: arraf_shop
description: Production-ready Flutter scaffold generated by the wizard.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^17.1.0

  # Networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  provider: ^6.1.5+1

  # Storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Images & SVG
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.4

  # Icons
  hugeicons: ^1.1.5

  # Typography — Cinzel for the splash wordmark
  google_fonts: ^6.2.1

  # i18n / formatting
  intl: ^0.20.2

  # Shimmer / Skeleton
  skeletonizer: ^2.1.3

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2
  smooth_page_indicator: ^2.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Logging
  logger: ^2.6.2

  # Realtime (Pusher)
  pusher_channels_flutter: ^2.4.0

  # Media
  image_picker: ^1.2.1
  file_picker: ^10.3.10

  # Utilities
  path_provider: ^2.1.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  permission_handler: ^12.0.1
  geolocator: ^14.0.2

  # Calendar view for attendance history
  table_calendar: ^3.2.0

  # Device & System
  device_info_plus: ^11.2.0
  app_version_update: ^6.2.0


  # Localization
  easy_localization: ^3.0.8

  flutter_native_splash: ^2.4.7
  mobile_scanner: ^7.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.12.2
  hive_ce_generator: ^1.11.1

  # App-icon generation from custom artwork in assets/icons/.
  # Run: `dart run tool/composite_app_icon.dart` to rebuild the flattened
  # launcher tile (gold bg + white wordmark), then
  # `dart run flutter_launcher_icons` to produce all platform variants.
  flutter_launcher_icons: ^0.14.4
  image: ^4.5.4

# Native splash — the iOS LaunchImage / Android splash_screen drawable that
# the OS shows *before* Flutter boots. Without this the user sees a blank
# white screen between tapping the icon and the animated splash starting.
# Run `dart run flutter_native_splash:create` after editing.
flutter_native_splash:
  # Charcoal matches the outer edge of the animated splash's radial
  # backdrop so the handoff to the Flutter splash is seamless.
  color: "#0B0B0E"
  image: "assets/icons/arraf.png"
  # Android 12+ uses a separate splash API with a forced circular mask and
  # a sized icon. Keep the same colour + mark.
  android_12:
    color: "#0B0B0E"
    image: "assets/icons/arraf.png"
    icon_background_color: "#0B0B0E"
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  # Full-bleed tile: white wordmark composited onto the theme's gold.
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#F59E0B"
  # Adaptive (Android 8+): gold plate behind the white wordmark so the mark
  # reads crisply regardless of the launcher's mask shape and stays visually
  # consistent with the splash background.
  adaptive_icon_background: "#F59E0B"
  adaptive_icon_foreground: "assets/icons/arraf.png"
  adaptive_icon_monochrome: "assets/icons/arraf.png"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - .env

